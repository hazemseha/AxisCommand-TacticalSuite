name: AxisCommand Android Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets
        run: npx vite build

      - name: Copy Static Assets to dist
        run: |
          mkdir -p dist/assets dist/elevation-data dist/buildings
          cp -r public/assets/icon1.png dist/assets/ 2>/dev/null || true
          cp -r public/assets/icon2.png dist/assets/ 2>/dev/null || true
          cp -r public/elevation-data/* dist/elevation-data/ 2>/dev/null || true
          cp -r public/buildings/* dist/buildings/ 2>/dev/null || true
          echo "dist contents:"
          find dist -type f | head -20

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: chmod +x ./gradlew && ./gradlew assembleDebug --no-daemon

      - name: Extract Version
        id: version
        run: |
          VERSION=$(grep -oP 'versionName "\K[^"]+' android/app/build.gradle || echo "2.0.0")
          BUILD=$(grep -oP 'versionCode \K\d+' android/app/build.gradle || echo "1")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-build$BUILD" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/AxisCommand-V${{ steps.version.outputs.version }}-debug.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AxisCommand-V${{ steps.version.outputs.version }}-debug
          path: android/app/build/outputs/apk/debug/AxisCommand-V${{ steps.version.outputs.version }}-debug.apk
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets
        run: npx vite build

      - name: Copy Static Assets to dist
        run: |
          mkdir -p dist/assets dist/elevation-data dist/buildings
          cp -r public/assets/icon1.png dist/assets/ 2>/dev/null || true
          cp -r public/assets/icon2.png dist/assets/ 2>/dev/null || true
          cp -r public/elevation-data/* dist/elevation-data/ 2>/dev/null || true
          cp -r public/buildings/* dist/buildings/ 2>/dev/null || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Release APK
        working-directory: android
        run: chmod +x ./gradlew && ./gradlew assembleRelease --no-daemon

      - name: Extract Version
        id: version
        run: |
          VERSION=$(grep -oP 'versionName "\K[^"]+' android/app/build.gradle || echo "2.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename Release APK
        run: |
          mv android/app/build/outputs/apk/release/app-release-unsigned.apk \
             android/app/build/outputs/apk/release/AxisCommand-V${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AxisCommand V${{ steps.version.outputs.version }}"
          body: |
            ## AxisCommand Tactical Suite V${{ steps.version.outputs.version }}
            
            ### Changes
            - See commit history for detailed changes
            
            ### Installation
            1. Download `AxisCommand-V${{ steps.version.outputs.version }}.apk`
            2. Transfer to Xiaomi Pad 6
            3. Install and grant permissions
          files: android/app/build/outputs/apk/release/AxisCommand-V${{ steps.version.outputs.version }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
